# fly.toml app configuration file generated for bluedot-backend-autumn-grass-4638 on 2026-03-30T00:30:37+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# SQLite 영구 저장: Volume 이름 bluedot_data 를 먼저 만든 뒤 배포하세요.
#   fly volumes create bluedot_data --region nrt --size 3
#   fly scale count 1
#   fly deploy
# (Volume은 Machine 1대에만 붙습니다. SQLite는 replica 1 권장.)

app = 'bluedot-backend-autumn-grass-4638'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  BLUEDOT_TEST_MODE = '0'
  BLUEDOT_DB_PATH = '/data/bluedot.db'

[[mounts]]
  source = 'bluedot_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
